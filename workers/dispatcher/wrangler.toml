name = "ciutatis-dispatcher"
main = "src/index.ts"
compatibility_date = "2025-01-01"

account_id = "b9f5ebc6c05975fab56f056782461b77"

[[routes]]
pattern = "ciutatis.com/*"
zone_name = "ciutatis.com"

[[routes]]
pattern = "www.ciutatis.com/*"
zone_name = "ciutatis.com"

[vars]
LANDING_ORIGIN = "https://0a5a2ab0.ciutatis-ui.pages.dev"

[[kv_namespaces]]
binding = "ROUTING_CACHE"
id = "9e5684759e4c44c9afb714a552f709b0"

[[kv_namespaces]]
binding = "TENANT_CACHE"
id = "9e5684759e4c44c9afb714a552f709b0"

[[d1_databases]]
binding = "DB"
database_name = "ciutatis-db"
database_id = "2978f493-067e-40c8-ab7d-ca4b2926d17c"

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "ciutatis-assets"

[observability]
enabled = true
head_sampling_rate = 1
